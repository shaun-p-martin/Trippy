services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trippy
      POSTGRES_PASSWORD: trippy
      POSTGRES_DB: trippy
    ports:
      - "5432:5432"
    volumes:
      - trippy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trippy -d trippy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trippy_pg_data:
